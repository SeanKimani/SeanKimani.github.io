# Contact Form Setup
# Create a Formspree account later if you want this active.
formspree-key: https://formspree.io/f/{8-digit key}

# Light professional theme
colors:
  text: "#1f2933"
  border: "#d9dee7"
  link: "#2f6f9f"
  highlight: "#1f5f8b"
  background: "#ffffff"
  light_background: "#f6f8fb"

#########################################################################################################
# Build settings for the site.
# Editing below may cause the site to malfunction.

collections:
  projects:
    output: true
    permalink: /projects/:path/

markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1
      indent: 0

plugins:
  - jekyll-feed

include:
  - _projects




