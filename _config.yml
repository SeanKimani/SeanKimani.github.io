# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup
title: Sean Kimani | Mechanical Engineering Portfolio

# Hero Section
name: Sean Kimani
headline: Mechanical Engineering Student | CAD, Manufacturing, Testing & Product Design

description: >-
  I am a Mechanical Engineering student at Columbia University focused on mechanical design, manufacturing,
  CAD, prototyping, testing, and product development. My experience spans Formula SAE electromechanical
  enclosure design, CNC machining, injection molding, reverse engineering, aerodynamic testing, and facility-scale
  CAD digitalization. I am seeking entry-level mechanical engineering opportunities where I can apply hands-on
  design, analysis, and validation skills to real engineering problems.

# Place your profile image in /assets/images/profile-image/ and update the file name
profile_image: ./assets/images/profile-image/profile.jpg

# Link your resume
# Upload your resume PDF to assets/resume/ and use this path:
resume-url: /assets/resume/Sean-Kimani-Resume-2026.pdf

